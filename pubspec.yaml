name: sngnav_app
description: >-
  Alpha-stage navigation companion for snow-zone commuting. The SPA Actuator
  unit's first edge-developer use of the navigation_safety packages from
  pub.dev — eating our own dog food while learning what fails.
version: 0.0.5
publish_to: 'none'

environment:
  sdk: ^3.11.1
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  # CAPPED (AAE-3, measured 2026-07-05 via pub.dev API): core ^0.11.x is
  # UNREACHABLE hosted — SIX siblings pin navigation_safety_core ^0.10.0:
  # voice_guidance 0.7.2, navigation_safety 0.9.3, offline_tiles 0.5.3,
  # map_viewport_bloc 0.4.3, driving_conditions 0.5.4, snow_rendering 0.2.5.
  # Needs a coordinated catalog-side republish wave against core ^0.11.x
  # (FDD lane) before this app can float. Do NOT force past the resolver.
  navigation_safety_core: ^0.10.0
  navigation_safety: ^0.9.0
  voice_guidance: ^0.7.2
  offline_tiles: ^0.5.0
  map_viewport_bloc: ^0.4.0
  driving_conditions: ^0.5.0
  driving_weather: ^0.4.0
  adaptive_reroute: ^0.1.5
  route_condition_forecast: ^0.1.0
  # CAPPED (AAE-3, measured 2026-07-05): routing_engine ^0.5.0 is blocked by
  # route_condition_forecast 0.1.4 (pins routing_engine ^0.4.0; needs a
  # catalog-side republish against ^0.5.x). voice_guidance 0.7.2 and
  # adaptive_reroute 0.1.5 already allow <0.6.0. Floor raised to the latest
  # reachable 0.4.x line.
  routing_engine: ^0.4.2
  fleet_hazard: ^0.5.0
  snow_rendering: ^0.2.0
  condition_aggregator: ^0.0.3
  condition_aggregator_jma: ^0.3.0
  noaa_nws_adapter: ^0.0.3
  flutter_map: ^8.2.2
  flutter_bloc: ^9.0.0
  latlong2: ^0.9.1
  http: ^1.2.0
  intl: ^0.20.2
  geolocator: ^13.0.0
  cupertino_icons: ^1.0.8
  flutter_tts: ^4.2.5
  vibration: ^3.2.0
  wakelock_plus: ^1.6.1
  navigation_safety_enums: ^0.1.4
  flutter_localizations:
    sdk: flutter
  compound_failure_advisor: ^0.1.1
  localization_fallback: ^0.1.1
  # Offline-basemap PoC wiring (Chair Option A, 2026-07-01): read the bundled
  # placeholder MBTiles archive + write it to a temp file for sqlite3 to open.
  # Both are already transitively present via offline_tiles; declared directly
  # so app code may import them (depend_on_referenced_packages).
  mbtiles: ^0.5.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    # HONEST PLACEHOLDER offline basemap (wiring PoC) — grid+text tiles, NOT
    # real Akita cartography. Regenerate via tool/make_placeholder_mbtiles.py.
    # Real Akita/Tohoku raster tiles are EIE's Geofabrik ODbL-render production.
    - assets/tiles/akita_offline_placeholder.mbtiles
