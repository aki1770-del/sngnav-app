name: sngnav_app
description: >-
  Alpha-stage navigation companion for snow-zone commuting. The SPA Actuator
  unit's first edge-developer use of the navigation_safety packages from
  pub.dev — eating our own dog food while learning what fails.
version: 0.0.5
publish_to: 'none'

environment:
  sdk: ^3.11.1
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  # CAPPED (AAE-3, measured 2026-07-05 via pub.dev API): core ^0.11.x is
  # UNREACHABLE hosted — SIX siblings pin navigation_safety_core ^0.10.0:
  # voice_guidance 0.7.2, navigation_safety 0.9.3, offline_tiles 0.5.3,
  # map_viewport_bloc 0.4.3, driving_conditions 0.5.4, snow_rendering 0.2.5.
  # Needs a coordinated catalog-side republish wave against core ^0.11.x
  # (FDD lane) before this app can float. Do NOT force past the resolver.
  navigation_safety_core: ^0.10.0
  navigation_safety: ^0.9.0
  voice_guidance: ^0.7.2
  offline_tiles: ^0.5.0
  map_viewport_bloc: ^0.4.0
  driving_conditions: ^0.5.0
  driving_weather: ^0.4.0
  adaptive_reroute: ^0.1.5
  route_condition_forecast: ^0.1.0
  # CAP RELEASED (2026-07-05): route_condition_forecast 0.1.5 widened its
  # routing_engine range, unblocking 0.5.0 — the language-honoring
  # turn-by-turn line (Japanese by default; the instruction the voice lane
  # speaks verbatim). On-device OPS-066 verification still owed before any
  # "reaches HER" claim (docs/on_device_verify_checklist.md).
  routing_engine: ^0.5.0
  fleet_hazard: ^0.5.0
  snow_rendering: ^0.2.0
  condition_aggregator: ^0.0.3
  condition_aggregator_jma: ^0.3.0
  noaa_nws_adapter: ^0.0.3
  flutter_map: ^8.2.2
  flutter_bloc: ^9.0.0
  latlong2: ^0.9.1
  http: ^1.2.0
  intl: ^0.20.2
  geolocator: ^13.0.0
  cupertino_icons: ^1.0.8
# Deliberate direct declaration (not imported in lib/ — TTS flows through
# voice_guidance's FlutterTtsEngine): floor-pins the transitive version so a
# voice_guidance range change can never silently downgrade HER voice lane.
# Maintainer watch (FEM 2026-07-11): flutter_tts idle since 2026-01; if it
# breaks on a future targetSdk, the lane is fork-or-vendor via voice_guidance.
  flutter_tts: ^4.2.5
  vibration: ^3.2.0
  wakelock_plus: ^1.6.1
  navigation_safety_enums: ^0.1.4
  flutter_localizations:
    sdk: flutter
  compound_failure_advisor: ^0.1.1
  localization_fallback: ^0.1.1
  # Offline-basemap PoC wiring (Chair Option A, 2026-07-01): read the bundled
  # placeholder MBTiles archive + write it to a temp file for sqlite3 to open.
  # Both are already transitively present via offline_tiles; declared directly
  # so app code may import them (depend_on_referenced_packages).
  mbtiles: ^0.5.0
  path_provider: ^2.1.5
  # Bundles libsqlite3.so on Android/iOS. WITHOUT this, package:sqlite3
  # cannot open the bundled MBTiles on a real device (Android forbids
  # loading the system libsqlite3), MbTiles() throws, and the offline
  # basemap silently fell back to network tiles — the map was BLANK in
  # airplane mode on-device while every host-side test painted it.
  # Caught by the 2026-07-10 emulator airplane-mode pass.
  # DO NOT bump past 0.5.x without an on-device airplane-mode re-verify:
  # 0.6.0+eol is a deprecated NO-OP (the .so moves to package:sqlite3 build
  # hooks, which did NOT deliver on our 2026-07-10 build). ^0.5.24 cannot
  # float to 0.6.0 (caret-on-0.x), so only a manual bump can re-open the
  # blank-offline-map failure. FEM ecosystem read 2026-07-11.
  sqlite3_flutter_libs: ^0.5.24
  # C6 ログを共有 — user-initiated share-sheet export of the local error
  # log (text share; no FileProvider, no manifest change).
  share_plus: ^13.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Direct sqlite reads in the offline-archive contract test (per-zoom tile
  # counts + custom metadata keys the mbtiles API does not expose).
  sqlite3: ^3.3.4

flutter:
  uses-material-design: true
  assets:
    # REAL offline Akita basemap — OpenStreetMap cartography (minimal style):
    # Akita prefecture z8-z12; z13 at Akita city + prefecture-wide selective
    # rural tiles (major road or town, clipped to the 秋田県 boundary). Sea
    # fill, network-verified route shields (国道/県道/expressway), bridge/
    # tunnel styling, lakes incl. multipolygon relations, ja labels, honest
    # no-data tint. Pipeline + runbook: tool/README_TILES.md (cut pinned
    # tohoku-260709). Data (c) OpenStreetMap contributors, ODbL.
    - assets/tiles/akita_offline.mbtiles
