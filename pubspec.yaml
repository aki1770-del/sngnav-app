name: sngnav_app
description: >-
  Alpha-stage navigation companion for snow-zone commuting. The SPA Actuator
  unit's first edge-developer use of the navigation_safety packages from
  pub.dev — eating our own dog food while learning what fails.
version: 0.0.4
publish_to: 'none'

environment:
  sdk: ^3.11.1
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  navigation_safety_core: ^0.4.1
  flutter_map: ^7.0.0
  latlong2: ^0.9.1
  http: ^1.2.0
  intl: ^0.19.0
  geolocator: ^13.0.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
