# CI for sngnav-app — analyze + test on every PR + push to main.
# Mirrors the SNGNav root CI workflow shape.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # FULL history — the loom mutation gate reconstructs the pre-96fd023 manifest
          # guard from git (the one that ACTUALLY shipped and ACTUALLY passed a manifest
          # killing HER location dot) and requires itself to REFUSE it. A shallow clone
          # cannot see that commit, so the gate correctly HALTED rather than certify what
          # it could not prove. The fix is to give it the history, never to soften the gate
          # into passing — a gate that skips when it cannot check is the anti-loom.
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.4'

      - name: Loom mutation gate (a guard is not INSERTED until PROVEN to FAIL)
        run: bash tool/loom_mutation_gate.sh --self-test

      - name: Manifest guard self-test (the loom proves itself before it judges)
        run: bash tool/assert_manifest_perms.sh --self-test

      - name: Assert Android manifest perms + voice-lane <queries> (dead-HER blocker guard)
        run: bash tool/assert_manifest_perms.sh

      - name: Resolve dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  # Proves the APK actually builds on an SDK-bearing runner (the local dev env
  # has no Android SDK, so this build is verified in CI, not on the author's
  # machine — honest per OPS-066). The perm-assert also gates here so a manifest
  # that lost the WS1 perms fails BEFORE a dead APK is ever produced.
  android-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # FULL history — the loom mutation gate reconstructs the pre-96fd023 manifest
          # guard from git (the one that ACTUALLY shipped and ACTUALLY passed a manifest
          # killing HER location dot) and requires itself to REFUSE it. A shallow clone
          # cannot see that commit, so the gate correctly HALTED rather than certify what
          # it could not prove. The fix is to give it the history, never to soften the gate
          # into passing — a gate that skips when it cannot check is the anti-loom.
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.4'

      - name: Loom mutation gate (a guard is not INSERTED until PROVEN to FAIL)
        run: bash tool/loom_mutation_gate.sh --self-test

      - name: Manifest guard self-test (the loom proves itself before it judges)
        run: bash tool/assert_manifest_perms.sh --self-test

      - name: Assert Android manifest perms + voice-lane <queries> (dead-HER blocker guard)
        run: bash tool/assert_manifest_perms.sh

      - name: Resolve dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug
